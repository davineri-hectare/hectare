window.storage={
  get:(k)=>{try{const v=localStorage.getItem(k);return Promise.resolve(v?{key:k,value:v}:null)}catch{return Promise.resolve(null)}},
  set:(k,v)=>{try{localStorage.setItem(k,v);return Promise.resolve({key:k,value:v})}catch{return Promise.resolve(null)}},
  delete:(k)=>{try{localStorage.removeItem(k);return Promise.resolve({key:k,deleted:true})}catch{return Promise.resolve(null)}},
  list:(p="")=>{try{const keys=Object.keys(localStorage).filter(k=>k.startsWith(p));return Promise.resolve({keys})}catch{return Promise.resolve({keys:[]})}}
}
</script>

function Badge({color,children}){return <span className={`badge badge-${color}`}>{children}</span>}

function Metric({label,value,sub,color,progress}){
  const bars={green:"var(--gr)",yellow:"var(--ye)",red:"var(--re)",blue:"var(--bl)"}
  return(
    <div className={`metric${color?" "+color:""}`}>
      <div className="m-label">{label}</div>
      <div className={`m-val${color?" "+color:""}`}>{value}</div>
      {sub&&<div className="m-sub">{sub}</div>}
      {progress!==undefined&&<div className="prog"><div className="prog-fill" style={{width:(progress*100)+"%",background:bars[color]||"var(--gr)"}}/></div>}
    </div>
  )
}

function PinModal({onSuccess,onClose,storedPin}){
  const [pin,setPin]=useState("")
  const [err,setErr]=useState(false)
  const check=()=>{if(pin===storedPin)onSuccess();else{setErr(true);setPin("");setTimeout(()=>setErr(false),1500)}}
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>🔒 Área restrita</h3>
        <p style={{fontSize:13,color:"var(--t2)",marginBottom:16}}>Digite o PIN de administrador.</p>
        <input className="pin-input" type="password" maxLength={6} placeholder="••••" value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&check()} autoFocus/>
        {err&&<p style={{color:"var(--re)",fontSize:12,marginTop:8,textAlign:"center"}}>PIN incorreto.</p>}
        <div className="btn-row" style={{marginTop:16}}>
          <button className="btn btn-sec btn-sm" onClick={onClose}>Cancelar</button>
          <button className="btn btn-gr btn-sm" onClick={check}>Entrar</button>

    </div>
  )
}

}

function App(){
  const [tab,setTab]=useState("pedido")
  const [step,setStep]=useState(1)
  const [ctab,setCtab]=useState("produtos")
  const [loaded,setLoaded]=useState(false)
  const [notify,setNotify]=useState("")
  const [showPin,setShowPin]=useState(false)
  const [cfgAuth,setCfgAuth]=useState(false)
  const [searchHist,setSearchHist]=useState("")
  const [products,setProducts]=useState(DP)
  const [bonifs,setBonifs]=useState(DB)
  const [sellers,setSellers]=useState(DS)
  const [history,setHistory]=useState([])
  const [adminPin,setAdminPin]=useState(DEFAULT_PIN)
  const [items,setItems]=useState([{id:100,product:"",qty:1,discPct:0}])
  const [bItems,setBItems]=useState([{id:101,item:"",qty:1}])

  const nextId=useRef(100)
  const newId=()=>++nextId.current

  useEffect(()=>{
    async function load(){
      try{
        const rs=await Promise.allSettled(["hect_p","hect_b","hect_s","hect_h","hect_pin"].map(k=>window.storage.get(k)))
        if(rs[0].value?.value)setProducts(JSON.parse(rs[0].value.value))
        if(rs[1].value?.value)setBonifs(JSON.parse(rs[1].value.value))
        if(rs[2].value?.value)setSellers(JSON.parse(rs[2].value.value))
        if(rs[3].value?.value)setHistory(JSON.parse(rs[3].value.value))
        if(rs[4].value?.value)setAdminPin(rs[4].value.value)
      }catch(e){}
      setLoaded(true)
    }
    load()
  },[])

  useEffect(()=>{if(loaded)window.storage.set("hect_p",JSON.stringify(products)).catch(()=>{})},[products,loaded])
  useEffect(()=>{if(loaded)window.storage.set("hect_b",JSON.stringify(bonifs)).catch(()=>{})},[bonifs,loaded])
  useEffect(()=>{if(loaded)window.storage.set("hect_s",JSON.stringify(sellers)).catch(()=>{})},[sellers,loaded])
  useEffect(()=>{if(loaded)window.storage.set("hect_h",JSON.stringify(history)).catch(()=>{})},[history,loaded])

  function msg(t){setNotify(t);setTimeout(()=>setNotify(""),2500)}

  const calcs=useMemo(()=>{
    const pm={};products.forEach(p=>{pm[p.name]=p})
    const bm={};bonifs.forEach(b=>{bm[b.name]=b})
    let tp=0,tsd=0,tcmv=0,tdm=0
    items.forEach(({product,qty,discPct})=>{
      const p=pm[product];if(!p)return
      const n=+qty||0,d=+discPct||0
      tp+=(p.price-p.maxDisc*d)*n;tsd+=p.price*n;tcmv+=p.cmv*n;tdm+=(p.price-p.maxDisc)*n
    })
    let tb=0;bItems.forEach(({item,qty})=>{const b=bm[item];if(b)tb+=b.cost*(+qty||0)})
    const cc=tcmv+tb,bmax=tp*.05
    const mcMax=tsd>0?COEF_PV*tsd-COEF_CMV*tcmv:0
    const mcReal=tp>0?COEF_PV*tp-COEF_CMV*cc:0
    const mcMin=tdm>0?COEF_PV*tdm-COEF_CMV*(tcmv+.05*tdm):0
    const rng=mcMax-mcMin
    const aprov=rng>0?Math.max(0,Math.min(1,(mcReal-mcMin)/rng)):0
    const comPct=.01+.02*aprov,comR=comPct*tp
    const col=aprov>=.7?"green":aprov>=.4?"yellow":"red"
    const status=aprov>=.7?"ÓTIMO":aprov>=.4?"BOM":"BAIXO"
    const alcada=aprov>=.7?"Vendedor":aprov>=.4?"Gerente":"Diretor"
    return{tp,tsd,tcmv,tdm,tb,cc,bmax,aprov,comPct,comR,col,status,alcada}
  },[items,bItems,products,bonifs])

  function updItem(i,k,v){const n=[...items];n[i]={...n[i],[k]:v};if(k==="product")n[i].discPct=0;setItems(n)}
  function updBonif(i,k,v){const n=[...bItems];n[i]={...n[i],[k]:v};setBItems(n)}
  function updProd(i,k,v){const n=[...products];n[i]={...n[i],[k]:k==="name"?v:(+v||0)};setProducts(n)}
  function updBon(i,k,v){const n=[...bonifs];n[i]={...n[i],[k]:k==="name"?v:(+v||0)};setBonifs(n)}
  function updSel(i,v){const n=[...sellers];n[i]={name:v};setSellers(n)}
  function reset(w){if(w==="p"){setProducts(DP);msg("✓ Produtos resetados")}if(w==="b"){setBonifs(DB);msg("✓ Bonificações resetadas")}if(w==="s"){setSellers(DS);msg("✓ Vendedores resetados")}}

  function buildContractData(){
    const pm={};products.forEach(p=>{pm[p.name]=p})
    const bm={};bonifs.forEach(b=>{bm[b.name]=b})
    const lineItems=items.filter(i=>pm[i.product]).map(i=>{
      const p=pm[i.product],n=+i.qty||1,d=+i.discPct||0,pf=p.price-p.maxDisc*d
      return{name:i.product,qty:n,unitPrice:pf,subtotal:pf*n}
    })
    const bonifItems=bItems.filter(b=>bm[b.item]).map(b=>({name:b.item,qty:+b.qty||1}))
    return{lineItems,bonifItems,cli:{...cli},meta:{...meta},tipo,total:calcs.tp}
  }

  function openContract(data){
    const html=buildContractHTML(data)
    const w=window.open("","_blank")
    if(!w){alert("Permita pop-ups para gerar o contrato.");return}
    w.document.write(html);w.document.close()
  }

  function saveOrder(){
    const pm={};products.forEach(p=>{pm[p.name]=p})
    const bm={};bonifs.forEach(b=>{bm[b.name]=b})
    const prodList=items.filter(i=>pm[i.product]).map(i=>`${i.product} x${+i.qty||1} (${((+i.discPct||0)*100).toFixed(0)}% desc)`).join(" | ")
    const bonList=bItems.filter(b=>bm[b.item]).map(b=>`${b.item} x${b.qty||1}`).join(" | ")
    const o={id:Date.now(),date:new Date().toLocaleDateString("pt-BR"),client:cli.nome||"(sem nome)",doc:cli.doc||"—",total:calcs.tp,vend:meta.vend||"—",aprov:calcs.aprov,com:calcs.comR,comPct:calcs.comPct,status:calcs.status,pgto:meta.pgto||"—",local:meta.local||"—",email:cli.email||"—",tel:cli.tel||"—",prodList,bonList,tipo,contractData:buildContractData()}
    setHistory([o,...history].slice(0,200));msg("✓ Salvo no histórico")
  }

  function deleteOrder(id){setHistory(history.filter(h=>h.id!==id));msg("✓ Pedido excluído")}

  const exportCSV=useCallback(()=>{
    if(!history.length){msg("Nenhum pedido para exportar");return}
    const hdr=["Data","Cliente","Doc","Tipo","Vendedor","Produtos","Bonificações","Total (R$)","Aproveitamento (%)","Comissão (R$)","Comissão (%)","Status","Pagamento","Local","Email","Telefone"]
    const rows=history.map(h=>[h.date,h.client,h.doc,h.tipo||"—",h.vend,`"${h.prodList||""}"`,`"${h.bonList||""}"`,h.total?.toFixed(2)||"0",((h.aprov||0)*100).toFixed(1),(h.com||0).toFixed(2),((h.comPct||0)*100).toFixed(2),h.status||"—",h.pgto||"—",h.local||"—",h.email||"—",h.tel||"—"])
    const csv="\uFEFF"+[hdr.join(";"),...rows.map(r=>r.join(";"))].join("\n")
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"})
    const url=URL.createObjectURL(blob)
    const a=document.createElement("a");a.href=url;a.download=`hectare_pedidos_${new Date().toISOString().slice(0,10)}.csv`;a.click()
    URL.revokeObjectURL(url);msg("✓ CSV exportado")
  },[history])

  function copyRow(h){
    const row=[h.date,h.client,h.doc,h.tipo||"—",h.vend,h.prodList||"",h.bonList||"",h.total?.toFixed(2)||"0",((h.aprov||0)*100).toFixed(1)+"%",(h.com||0).toFixed(2),h.status||"—",h.pgto||"—"].join("\t")
    navigator.clipboard.writeText(row).then(()=>msg("✓ Linha copiada")).catch(()=>msg("Erro ao copiar"))
  }

  function handleConfigTab(){cfgAuth?setTab("config"):setShowPin(true)}
  function savePin(p){setAdminPin(p);window.storage.set("hect_pin",p).catch(()=>{});msg("✓ PIN atualizado")}

  const stepInfo=[{n:1,l:"Pedido"},{n:2,l:"Cliente"},{n:3,l:"Contrato"}]
  const filteredHist=searchHist?history.filter(h=>(h.client+h.vend+h.doc+h.date).toLowerCase().includes(searchHist.toLowerCase())):history

  return(
    <>
      <style>{CSS}</style>
      <div className="happ">
        <div style={{maxWidth:960,margin:"0 auto"}}>
          <div className="hdr">
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div className="logo-icon">🚁</div>
              <div><div className="logo-name">HECTARE UBERLÂNDIA</div><div className="logo-sub">Simulador de Vendas · DJI Agras</div></div>
            </div>
            {notify&&<span className="notify">{notify}</span>}
          </div>
          <div className="tabs">
            {[["pedido","＋ Novo pedido"],["historico","📋 Histórico"]].map(([k,l])=>(

            ))}

          </div>

          {tab==="pedido"&&<>
            <div className="stepr">
              {stepInfo.map(({n,l},i)=>(
                <div key={n} style={{display:"flex",alignItems:"center",flex:1}}>

                    <tbody>
                      {items.map((it,idx)=>{
                        const p=products.find(x=>x.name===it.product)
                        const n=+it.qty||0,d=+it.discPct||0,pf=p?p.price-p.maxDisc*d:0
                        return <tr key={it.id}>
                          <td><select className="inp-sm" value={it.product} onChange={e=>updItem(idx,"product",e.target.value)}>
                            <option value="">Selecione...</option>
                            {products.map(p=><option key={p.name} value={p.name}>{p.name}</option>)}

                          <td><input type="number" className="inp-sm" min="1" value={it.qty} style={{textAlign:"center",width:48}} onChange={e=>updItem(idx,"qty",e.target.value)}/></td>

                    <Metric label="Alçada" value={calcs.alcada} color={calcs.col}/>
                    <Metric label="Total do pedido" value={fmtR(calcs.tp)}/>

                  <div className="ctitle"><span className="dot bl"/>SUA COMISSÃO</div>
                  <div className="metrics" style={{gridTemplateColumns:"1fr 1fr"}}>

                  </div>
                </div>
              </>}

                <div className="form-row"><div><span className="lbl">{tipo==="juridica"?"Razão social":"Nome completo"}</span><input value={cli.nome} onChange={e=>setCli({...cli,nome:e.target.value})}/></div><div><span className="lbl">{tipo==="juridica"?"CNPJ":"CPF"}</span><input value={cli.doc} onChange={e=>setCli({...cli,doc:e.target.value})}/></div></div>

          </>}

          {tab==="historico"&&<div className="card">
            <div className="ctitle"><span className="dot bl"/>PEDIDOS SALVOS<span style={{marginLeft:"auto",fontWeight:400,fontSize:11,color:"var(--t3)",textTransform:"none",fontFamily:"'DM Sans',sans-serif"}}>{history.length} pedido{history.length!==1?"s":""}</span></div>
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
              <input placeholder="🔍 Buscar..." value={searchHist} onChange={e=>setSearchHist(e.target.value)} style={{flex:1,minWidth:200}}/>
              <button className="btn btn-bl btn-sm" onClick={exportCSV}>⬇ Exportar CSV</button>
            </div>
            {filteredHist.length===0?<div className="empty">{searchHist?"Nenhum resultado.":"Nenhum pedido salvo ainda."}</div>:filteredHist.map(h=>(
              <div key={h.id} className="hist-row">
                <div className="hist-top">
                  <div style={{flex:1,minWidth:180}}>
                    <div style={{fontWeight:600,fontSize:13}}>{h.client}</div>
                    <div style={{fontSize:11,color:"var(--t3)"}}>{h.date} · {h.vend} · {h.doc}</div>
                    {h.pgto&&<div style={{fontSize:11,color:"var(--t3)"}}>{h.pgto}</div>}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:"var(--gr)",fontSize:14,whiteSpace:"nowrap"}}>{fmtR(h.total)}</div>
                    <Badge color={h.aprov>=.7?"green":h.aprov>=.4?"yellow":"red"}>{((h.aprov||0)*100).toFixed(0)}% aprov.</Badge>
                  </div>
                </div>
                <div className="hist-actions">
                  <button className="btn btn-gr btn-sm" onClick={()=>h.contractData&&openContract(h.contractData)}>📄 Gerar contrato</button>
                  <button className="btn btn-sec btn-sm" onClick={()=>copyRow(h)}>📋 Copiar linha</button>
                  <button className="btn btn-re btn-sm" onClick={()=>deleteOrder(h.id)}>🗑 Excluir</button>
                </div>
              </div>
            ))}
          </div>}

          {tab==="config"&&cfgAuth&&<>
            <div className="tabs" style={{marginBottom:16}}>{[["produtos","Produtos"],["bonifs","Bonificações"],["sellers","Vendedores"],["pin","PIN"]].map(([k,l])=><button key={k} className={`tab${ctab===k?" act":""}`} onClick={()=>setCtab(k)}>{l}</button>)}</div>
            {ctab==="produtos"&&<div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div className="ctitle" style={{marginBottom:0}}><span className="dot"/>PRODUTOS <span style={{fontSize:11,color:"var(--t3)",fontWeight:400,fontFamily:"'DM Sans',sans-serif"}}>· {products.length} itens</span></div>
                <button className="btn btn-sec btn-sm" onClick={()=>reset("p")}>Resetar padrão</button>
              </div>
              <div className="ovx"><table className="tbl">
                <thead><tr><th style={{minWidth:200}}>Nome</th><th style={{width:115}}>Preço (R$)</th><th style={{width:115}}>CMV (R$)</th><th style={{width:115}}>Desc. máx (R$)</th><th style={{width:75}}>MC %</th><th style={{width:115}}>MC R$</th><th style={{width:28}}/></tr></thead>
                <tbody>{products.map((p,idx)=>{
                  const mc=p.price>0?((COEF_PV*p.price-COEF_CMV*p.cmv)/p.price*100).toFixed(1)+"%":"—"
                  const mcAbs=p.price>0?fmtR(COEF_PV*p.price-COEF_CMV*p.cmv):"—"
                  return <tr key={idx}>
                    <td><input className="inp-sm" value={p.name} onChange={e=>updProd(idx,"name",e.target.value)}/></td>
                    <td><input type="number" className="inp-num" value={p.price} onChange={e=>updProd(idx,"price",e.target.value)}/></td>
                    <td><input type="number" className="inp-num" value={p.cmv} onChange={e=>updProd(idx,"cmv",e.target.value)}/></td>
                    <td><input type="number" className="inp-num" value={p.maxDisc} onChange={e=>updProd(idx,"maxDisc",e.target.value)}/></td>
                    <td style={{fontSize:12,color:"var(--t2)",textAlign:"right"}}>{mc}</td>
                    <td style={{fontSize:12,color:"var(--t2)",textAlign:"right"}}>{mcAbs}</td>
                    <td><button className="btn-ghost" onClick={()=>setProducts(products.filter((_,i)=>i!==idx))}>×</button></td>
                  </tr>
                })}</tbody>
              </table></div>
              <button className="btn btn-sec btn-sm" style={{marginTop:10}} onClick={()=>setProducts([...products,{name:"",price:0,cmv:0,maxDisc:0}])}>+ Novo produto</button>
            </div>}
            {ctab==="bonifs"&&<div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div className="ctitle" style={{marginBottom:0}}><span className="dot bl"/>BONIFICAÇÕES</div>
                <button className="btn btn-sec btn-sm" onClick={()=>reset("b")}>Resetar padrão</button>
              </div>
              <table className="tbl"><thead><tr><th>Nome</th><th style={{width:145}}>Custo (R$)</th><th style={{width:28}}/></tr></thead>
              <tbody>{bonifs.map((b,idx)=><tr key={idx}><td><input className="inp-sm" value={b.name} onChange={e=>updBon(idx,"name",e.target.value)}/></td><td><input type="number" className="inp-num" value={b.cost} onChange={e=>updBon(idx,"cost",e.target.value)}/></td><td><button className="btn-ghost" onClick={()=>setBonifs(bonifs.filter((_,i)=>i!==idx))}>×</button></td></tr>)}</tbody></table>
              <button className="btn btn-sec btn-sm" style={{marginTop:10}} onClick={()=>setBonifs([...bonifs,{name:"",cost:0}])}>+ Novo item</button>
            </div>}
            {ctab==="sellers"&&<div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div className="ctitle" style={{marginBottom:0}}><span className="dot ye"/>VENDEDORES</div>
                <button className="btn btn-sec btn-sm" onClick={()=>reset("s")}>Resetar padrão</button>
              </div>
              {sellers.map((s,idx)=><div key={idx} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}><input style={{maxWidth:340}} value={s.name} placeholder="Nome do vendedor" onChange={e=>updSel(idx,e.target.value)}/><button className="btn-ghost" onClick={()=>setSellers(sellers.filter((_,i)=>i!==idx))}>×</button></div>)}
              <button className="btn btn-sec btn-sm" style={{marginTop:4}} onClick={()=>setSellers([...sellers,{name:""}])}>+ Novo vendedor</button>
            </div>}
            {ctab==="pin"&&<div className="card">
              <div className="ctitle"><span className="dot"/>PIN DE ACESSO</div>
              <div style={{maxWidth:200}}>
                <span className="lbl">Novo PIN</span>
                <input type="password" maxLength={6} placeholder="Novo PIN" value={adminPin} onChange={e=>setAdminPin(e.target.value.replace(/\D/g,""))}/>
              </div>
              <button className="btn btn-gr btn-sm" style={{marginTop:10}} onClick={()=>savePin(adminPin)}>Salvar PIN</button>
            </div>}
            <div style={{fontSize:12,color:"var(--t3)",marginTop:8}}>
              🔒 Área restrita ·{" "}
              <button style={{background:"none",border:"none",color:"var(--re)",cursor:"pointer",fontSize:12,fontFamily:"inherit",textDecoration:"underline"}} onClick={()=>{setCfgAuth(false);setTab("pedido")}}>Sair da config</button>
            </div>
          </>}
        </div>
      </div>
    </>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)
</script>
</body>
</html>
