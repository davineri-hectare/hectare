window.storage={
  get:function(k){return new Promise(function(r,j){try{var v=localStorage.getItem(k);if(v!==null)r({key:k,value:v});else j(new Error("Not found"))}catch(e){j(e)}});},
  set:function(k,v){return new Promise(function(r,j){try{localStorage.setItem(k,v);r({key:k,value:v})}catch(e){j(e)}});},
  delete:function(k){return new Promise(function(r){localStorage.removeItem(k);r({key:k,deleted:true})});},
  list:function(p){return new Promise(function(r){var ks=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(!p||k.startsWith(p))ks.push(k)}r({keys:ks})});}
};
</script>

function Metric({label,value,sub,color,progress}){
  const vc=color?` ${color}`:""
  const bars={green:"var(--gr)",yellow:"var(--ye)",red:"var(--re)",blue:"var(--bl)"}
  return(
    <div className={`metric${color?" "+color:""}`}>
      <div className="m-label">{label}</div>
      <div className={`m-val${vc}`}>{value}</div>
      {sub&&<div className="m-sub">{sub}</div>}
      {progress!==undefined&&<div className="prog"><div className="prog-fill" style={{width:(progress*100)+"%",background:bars[color]||"var(--gr)"}}/></div>}
    </div>
  )

function PinModal({onSuccess,onClose}){
  const [pin,setPin]=useState("")
  const [err,setErr]=useState(false)
  const [storedPin,setStoredPin]=useState(DEFAULT_PIN)
  useEffect(()=>{window.storage.get("hect_pin").then(r=>{if(r?.value)setStoredPin(r.value)}).catch(()=>{})},[])
  const check=()=>{if(pin===storedPin){onSuccess()}else{setErr(true);setPin("");setTimeout(()=>setErr(false),1500)}}
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>🔒 Área restrita</h3>
        <p style={{fontSize:13,color:"var(--t2)",marginBottom:16}}>Digite o PIN de administrador para acessar as configurações.</p>
        <input className="pin-input" type="password" maxLength={6} placeholder="••••" value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,""))} onKeyDown={e=>e.key==="Enter"&&check()} autoFocus/>
        {err&&<p style={{color:"var(--re)",fontSize:12,marginTop:8,textAlign:"center"}}>PIN incorreto. Tente novamente.</p>}
        <div className="btn-row" style={{marginTop:16}}>
          <button className="btn btn-sec btn-sm" onClick={onClose}>Cancelar</button>
          <button className="btn btn-gr btn-sm" onClick={check}>Entrar</button>
        </div>
        <p style={{fontSize:11,color:"var(--t3)",marginTop:12,textAlign:"center"}}>PIN padrão: 1234</p>
      </div>
    </div>
  )
}

  function msg(t){setNotify(t);setTimeout(()=>setNotify(""),2500)}

  const calcs=useMemo(()=>{
    const pm={};products.forEach(p=>{pm[p.name]=p})
    const bm={};bonifs.forEach(b=>{bm[b.name]=b})
    let tp=0,tsd=0,tcmv=0,tdm=0,tpPromo=0,tpNormal=0
    items.forEach(({product,qty,discPct,isPromo:ip})=>{
      const p=pm[product];if(!p)return
      const n=+qty||0,d=+discPct||0
      if(ip){
        const eprice=p.price*promoFactor
        tpPromo+=eprice*n
      }else{
        tpNormal+=(p.price-p.maxDisc*d)*n
      }
      tsd+=p.price*n;tcmv+=p.cmv*n;tdm+=(p.price-p.maxDisc)*n
    })
    tp=tpPromo+tpNormal
    const ap=activePromo&&promos.find(p=>p.name===activePromo)
    let tb=0;bItems.forEach(({item,qty})=>{const b=bm[item];if(b)tb+=b.cost*(+qty||0)})
    const cc=tcmv+tb,bmax=tp*.05
    const mcMax=tsd>0?COEF_PV*tsd-COEF_CMV*tcmv:0
    const mcReal=tp>0?COEF_PV*tp-COEF_CMV*cc:0
    const mcMin=tdm>0?COEF_PV*tdm-COEF_CMV*(tcmv+.05*tdm):0
    const rng=mcMax-mcMin
    const aprov=rng>0?Math.max(0,Math.min(1,(mcReal-mcMin)/rng)):0
    const calcComPct=.01+.02*aprov
    const hasCustomCom=ap&&ap.comPct!=null&&ap.comPct>0
    const comPct=hasCustomCom?ap.comPct/100:calcComPct
    const comR=comPct*tp
    const col=aprov>=.7?"green":aprov>=.4?"yellow":"red"
    const status=aprov>=.7?"ÓTIMO":aprov>=.4?"BOM":"BAIXO"
    const alcada=aprov>=.7?"Vendedor":aprov>=.4?"Gerente":"Diretor"
    return{tp,tsd,tcmv,tdm,tb,cc,bmax,mcMax,mcReal,mcMin,aprov,comPct,comR,col,status,alcada,isPromo:!!ap,tpPromo,tpNormal,hasCustomCom}
  },[items,bItems,products,bonifs,activePromo,promos,promoFactor])

  function updItem(i,k,v){const n=[...items];n[i]={...n[i],[k]:v};if(k==="product")n[i].discPct=0;setItems(n)}
  function updBonif(i,k,v){const n=[...bItems];n[i]={...n[i],[k]:v};setBItems(n)}
  function updProd(i,k,v){const n=[...products];n[i]={...n[i],[k]:k==="name"?v:(+v||0)};setProducts(n)}
  function updBon(i,k,v){const n=[...bonifs];n[i]={...n[i],[k]:k==="name"?v:(+v||0)};setBonifs(n)}
  function updSel(i,v){const n=[...sellers];n[i]={name:v};setSellers(n)}
  function reset(w){if(w==="p"){setProducts(DP);msg("✓ Produtos resetados")}if(w==="b"){setBonifs(DB);msg("✓ Bonificações resetadas")}if(w==="s"){setSellers(DS);msg("✓ Vendedores resetados")}}

  function applyRoundTotal(){
    const target=+roundTarget
    if(!target||target<=0){msg("⚠ Informe um valor válido");return}
    const pm={};products.forEach(p=>{pm[p.name]=p})
    const normalItems=items.map((it,i)=>({...it,idx:i})).filter(it=>!it.isPromo&&pm[it.product])
    if(normalItems.length===0){msg("⚠ Sem itens ajustáveis");return}
    let promoTotal=0
    items.forEach(it=>{if(it.isPromo){const p=pm[it.product];if(p)promoTotal+=p.price*promoFactor*(+it.qty||0)}})
    const desiredNormal=target-promoTotal
    let listTotal=0,maxDiscTotal=0
    normalItems.forEach(it=>{const p=pm[it.product],n=+it.qty||0;listTotal+=p.price*n;maxDiscTotal+=p.maxDisc*n})
    if(desiredNormal>listTotal){msg("⚠ Valor maior que o preço tabela");return}
    if(maxDiscTotal===0){msg("⚠ Itens sem margem de desconto");return}
    const factor=Math.max(0,Math.min(1,(listTotal-desiredNormal)/maxDiscTotal))
    const newItems=[...items]
    normalItems.forEach(it=>{newItems[it.idx]={...newItems[it.idx],discPct:factor}})
    setItems(newItems)
    setRoundTarget("")
    msg("✓ Total ajustado para "+fmtR(target))
  }

  function applyPromo(promoName){
    if(!promoName){setActivePromo("");setPromoFactor(1);return}
    const promo=promos.find(p=>p.name===promoName)
    if(!promo)return
    const pm={};products.forEach(p=>{pm[p.name]=p})
    const newItems=promo.items.filter(i=>pm[i.product]).map(i=>({id:newId(),product:i.product,qty:i.qty||1,discPct:0,isPromo:true}))
    if(newItems.length===0){msg("⚠ Nenhum produto válido nesta promo");return}
    let listPrice=0
    newItems.forEach(i=>{const p=pm[i.product];if(p)listPrice+=p.price*(+i.qty||1)})
    const factor=listPrice>0?promo.totalPrice/listPrice:1
    setPromoFactor(factor)
    const newBonifs=(promo.bonifs||[]).map(b=>({id:newId(),item:b.item,qty:b.qty||1}))
    setItems(newItems.length>0?newItems:[{id:newId(),product:"",qty:1,discPct:0}])
    setBItems(newBonifs.length>0?newBonifs:[{id:newId(),item:"",qty:1}])
    setActivePromo(promoName)
    msg("✓ Promo \""+promo.name+"\" aplicada")
  }

  function applyKit(kitName){
    const kit=kits.find(k=>k.name===kitName)
    if(!kit)return
    const pm={};products.forEach(p=>{pm[p.name]=p})
    const newItems=kit.items.filter(i=>pm[i.product]).map(i=>({id:newId(),product:i.product,qty:i.qty||1,discPct:0}))
    if(newItems.length===0){msg("⚠ Nenhum produto válido neste kit");return}
    setItems(prev=>{
      const clean=prev.filter(i=>i.product!=="")
      return[...clean,...newItems]
    })
    msg("✓ Kit \""+kit.name+"\" adicionado")
  }

    const pm={};products.forEach(p=>{pm[p.name]=p})
    const bm={};bonifs.forEach(b=>{bm[b.name]=b})
    const prodList=items.filter(i=>pm[i.product]).map(i=>{
      const p=pm[i.product],n=+i.qty||1,d=+i.discPct||0
      return `${i.product} x${n} (${(d*100).toFixed(0)}% desc)`
    }).join(" | ")
    const bonList=bItems.filter(b=>bm[b.item]).map(b=>`${b.item} x${b.qty||1}`).join(" | ")
    const o={id:Date.now(),date:new Date().toLocaleDateString("pt-BR"),client:cli.nome||"(sem nome)",doc:cli.doc||"—",total:calcs.tp,vend:meta.vend||"—",aprov:calcs.aprov,com:calcs.comR,comPct:calcs.comPct,status:calcs.status,pgto:meta.pgto||"—",prazo:meta.prazo||"—",local:meta.local||"—",email:cli.email||"—",tel:cli.tel||"—",prodList,bonList,tipo,
      source:source||"manual",
      _items:JSON.parse(JSON.stringify(items.filter(i=>pm[i.product]))),

      _cli:{...cli},_meta:{...meta},_tipo:tipo,
      _activePromo:activePromo,_promoFactor:promoFactor
    }

  }

  function valorExtenso(n){
    if(!n||n===0)return"zero reais"
    const un=["","um","dois","três","quatro","cinco","seis","sete","oito","nove","dez","onze","doze","treze","quatorze","quinze","dezesseis","dezessete","dezoito","dezenove"]
    const dez=["","","vinte","trinta","quarenta","cinquenta","sessenta","setenta","oitenta","noventa"]
    const cent=["","cento","duzentos","trezentos","quatrocentos","quinhentos","seiscentos","setecentos","oitocentos","novecentos"]
    function g(v){
      if(v===0)return""
      if(v===100)return"cem"
      let s=""
      if(v>=100){s+=cent[Math.floor(v/100)];v%=100;if(v>0)s+=" e "}
      if(v>=20){s+=dez[Math.floor(v/10)];v%=10;if(v>0)s+=" e "}
      if(v>0)s+=un[v]
      return s
    }
    const inteiro=Math.floor(n)
    const centavos=Math.round((n-inteiro)*100)
    let r=""
    if(inteiro>=1000000){const m=Math.floor(inteiro/1000000);r+=g(m)+(m===1?" milhão":" milhões");const rest=inteiro%1000000;if(rest>0)r+=rest<1000?" e ":" "}
    const restM=inteiro%1000000
    if(restM>=1000){const mil=Math.floor(restM/1000);r+=(mil===1?"mil":g(mil)+" mil");const rest=restM%1000;if(rest>0)r+=rest<100?" e ":" e "}
    const restMil=inteiro%1000
    if(restMil>0)r+=g(restMil)
    if(inteiro===0)r="zero"
    r+=(inteiro===1?" real":" reais")
    if(centavos>0)r+=" e "+g(centavos)+(centavos===1?" centavo":" centavos")
    return r
  }

                    <div className="hist-actions">
                      {h._items&&<button className="btn btn-sec btn-sm" style={{fontSize:11,padding:"2px 8px",color:"var(--bl)"}} onClick={()=>restoreFromHistory(h)}>🔄 Restaurar</button>}
                      <button className="btn btn-sec btn-sm" style={{fontSize:11,padding:"2px 8px"}} onClick={()=>{const ta=document.createElement("textarea");ta.value=[h.date,h.client,h.doc,h.tipo||"—",h.vend,h.prodList||"",h.bonList||"",(h.total||0).toFixed(2),((h.aprov||0)*100).toFixed(1)+"%",(h.com||0).toFixed(2),h.status||"—",h.pgto||"—"].join("\t");ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);msg("✓ Copiado")}}>📋 Copiar</button>
                      <button className="btn btn-sec btn-sm" style={{fontSize:11,padding:"2px 8px",color:"var(--re)",borderColor:"rgba(239,68,68,.3)"}} onClick={()=>{const hid=h.id;setHistory(prev=>prev.filter(x=>x.id!==hid));msg("✓ Pedido excluído")}}>🗑 Excluir</button>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,color:"var(--gr)",fontSize:14}}>{fmtR(h.total)}</div>
                    <Badge color={h.aprov>=.7?"green":h.aprov>=.4?"yellow":"red"}>{((h.aprov||0)*100).toFixed(0)}% aprov.</Badge>
                  </div>
                </div>
              ))
            }
          </div>}

          {/* ── CONFIG (protegido) ── */}
          {tab==="config"&&cfgAuth&&<>
            <div className="tabs" style={{marginBottom:16}}>
              {[["produtos","Produtos"],["bonifs","Bonificações"],["promos","Promoções"],["kits","Kits"],["sellers","Vendedores"],["pin","PIN"]].map(([k,l])=>(
                <button key={k} className={`tab${ctab===k?" act":""}`} onClick={()=>setCtab(k)}>{l}</button>
              ))}
            </div>

            {ctab==="produtos"&&<div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div className="ctitle" style={{marginBottom:0}}><span className="dot"/>TABELA DE PRODUTOS <span style={{fontSize:11,color:"var(--t3)",fontWeight:400,fontFamily:"'DM Sans',sans-serif"}}>· {products.length} itens</span></div>
                <button className="btn btn-sec btn-sm" onClick={()=>reset("p")}>Resetar padrão</button>
              </div>
              <div className="ovx">
                <table className="tbl">
                  <thead><tr>
                    <th style={{minWidth:200}}>Nome</th><th style={{width:115}}>Preço tab. (R$)</th>
                    <th style={{width:115}}>CMV (R$)</th><th style={{width:115}}>Desc. máx (R$)</th>
                    <th style={{width:75}}>MC máx %</th><th style={{width:115}}>MC máx R$</th><th style={{width:28}}/>
                  </tr></thead>
                  <tbody>
                    {products.map((p,idx)=>{
                      const mc=p.price>0?((COEF_PV*p.price-COEF_CMV*p.cmv)/p.price*100).toFixed(1)+"%":"—"
                      const mcAbs=p.price>0?fmtR(COEF_PV*p.price-COEF_CMV*p.cmv):"—"
                      return <tr key={idx}>
                        <td><input className="inp-sm" value={p.name} onChange={e=>updProd(idx,"name",e.target.value)}/></td>
                        <td><input type="number" className="inp-num" value={p.price} onChange={e=>updProd(idx,"price",e.target.value)}/></td>
                        <td><input type="number" className="inp-num" value={p.cmv} onChange={e=>updProd(idx,"cmv",e.target.value)}/></td>
                        <td><input type="number" className="inp-num" value={p.maxDisc} onChange={e=>updProd(idx,"maxDisc",e.target.value)}/></td>
                        <td style={{fontSize:12,color:"var(--t2)",textAlign:"right"}}>{mc}</td>
                        <td style={{fontSize:12,color:"var(--t2)",textAlign:"right"}}>{mcAbs}</td>
                        <td><button className="btn-ghost" onClick={()=>setProducts(products.filter((_,i)=>i!==idx))}>×</button></td>
                      </tr>
                    })}
                  </tbody>
                </table>
              </div>
              <button className="btn btn-sec btn-sm" style={{marginTop:10}} onClick={()=>setProducts([...products,{name:"",price:0,cmv:0,maxDisc:0}])}>+ Novo produto</button>
            </div>}

            {ctab==="bonifs"&&<div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div className="ctitle" style={{marginBottom:0}}><span className="dot bl"/>BONIFICAÇÕES <span style={{fontSize:11,color:"var(--t3)",fontWeight:400,fontFamily:"'DM Sans',sans-serif"}}>· {bonifs.length} itens</span></div>
                <button className="btn btn-sec btn-sm" onClick={()=>reset("b")}>Resetar padrão</button>
              </div>
              <table className="tbl">
                <thead><tr><th>Nome do item</th><th style={{width:145}}>Custo (R$)</th><th style={{width:28}}/></tr></thead>
                <tbody>
                  {bonifs.map((b,idx)=>(
                    <tr key={idx}>
                      <td><input className="inp-sm" value={b.name} onChange={e=>updBon(idx,"name",e.target.value)}/></td>
                      <td><input type="number" className="inp-num" value={b.cost} onChange={e=>updBon(idx,"cost",e.target.value)}/></td>
                      <td><button className="btn-ghost" onClick={()=>setBonifs(bonifs.filter((_,i)=>i!==idx))}>×</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <button className="btn btn-sec btn-sm" style={{marginTop:10}} onClick={()=>setBonifs([...bonifs,{name:"",cost:0}])}>+ Novo item</button>
            </div>}

            {ctab==="promos"&&<div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div className="ctitle" style={{marginBottom:0}}><span className="dot" style={{background:"var(--ye)"}}/>PROMOÇÕES <span style={{fontSize:11,color:"var(--t3)",fontWeight:400,fontFamily:"'DM Sans',sans-serif"}}>· {promos.length} cadastradas</span></div>
              </div>
              {promos.length===0&&<p style={{fontSize:13,color:"var(--t3)",marginBottom:12}}>Nenhuma promoção cadastrada. Crie uma abaixo.</p>}
              {promos.map((promo,pi)=>{
                const pm={};products.forEach(p=>{pm[p.name]=p})
                const listPrice=(promo.items||[]).reduce((s,i)=>{const p=pm[i.product];return s+(p?p.price*(+i.qty||1):0)},0)
                const desconto=listPrice>0?((1-promo.totalPrice/listPrice)*100).toFixed(1):0
                return <div key={pi} style={{background:"var(--s2)",border:"1px solid var(--bd)",borderRadius:10,padding:14,marginBottom:12}}>
                  <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:180}}>
                      <span className="lbl">Nome da promo</span>
                      <input value={promo.name} placeholder="Ex: Kit T100 Verão" onChange={e=>{const n=[...promos];n[pi]={...n[pi],name:e.target.value};setPromos(n)}}/>
                    </div>
                    <div style={{width:150}}>
                      <span className="lbl">Valor do conjunto (R$)</span>
                      <input type="number" className="inp-num" value={promo.totalPrice} onChange={e=>{const n=[...promos];n[pi]={...n[pi],totalPrice:+e.target.value||0};setPromos(n)}}/>
                    </div>
                    <div style={{width:110}}>
                      <span className="lbl">Comissão (%)</span>
                      <input type="number" className="inp-num" step="0.1" min="0" max="100" placeholder="Auto" value={promo.comPct!=null?promo.comPct:""} onChange={e=>{const n=[...promos];const v=e.target.value;n[pi]={...n[pi],comPct:v===""?null:+v||0};setPromos(n)}}/>
                    </div>
                    <div style={{alignSelf:"flex-end"}}>
                      <button className="btn-ghost" style={{color:"var(--re)",fontSize:16}} onClick={()=>setPromos(promos.filter((_,i)=>i!==pi))}>×</button>
                    </div>
                  </div>
                  {promo.comPct!=null&&promo.comPct>0?<p style={{fontSize:11,color:"var(--ye)",marginBottom:4}}>Comissão fixa: {promo.comPct}%</p>:<p style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>Comissão: calculada automaticamente</p>}
                  {listPrice>0&&<p style={{fontSize:12,color:"var(--t3)",marginBottom:8}}>Preço tabela: {fmtR(listPrice)} · Desconto: {desconto}%</p>}

                  <span className="lbl" style={{marginTop:6}}>Produtos da promo</span>
                  <table className="tbl" style={{marginBottom:8}}>
                    <thead><tr><th>Produto</th><th style={{width:60}}>Qtd</th><th style={{width:28}}/></tr></thead>
                    <tbody>
                      {(promo.items||[]).map((it,ii)=>(
                        <tr key={ii}>
                          <td><select className="inp-sm" value={it.product} onChange={e=>{const n=[...promos];const items=[...(n[pi].items||[])];items[ii]={...items[ii],product:e.target.value};n[pi]={...n[pi],items};setPromos(n)}}>
                            <option value="">Selecione...</option>
                            {products.map(p=><option key={p.name} value={p.name}>{p.name}</option>)}
                          </select></td>
                          <td><input type="number" className="inp-sm" min="1" style={{textAlign:"center",width:48}} value={it.qty} onChange={e=>{const n=[...promos];const items=[...(n[pi].items||[])];items[ii]={...items[ii],qty:+e.target.value||1};n[pi]={...n[pi],items};setPromos(n)}}/></td>
                          <td><button className="btn-ghost" onClick={()=>{const n=[...promos];n[pi]={...n[pi],items:(n[pi].items||[]).filter((_,i)=>i!==ii)};setPromos(n)}}>×</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  <button className="btn btn-sec btn-sm" onClick={()=>{const n=[...promos];n[pi]={...n[pi],items:[...(n[pi].items||[]),{product:"",qty:1}]};setPromos(n)}}>+ Produto</button>

                  <span className="lbl" style={{marginTop:14,display:"block"}}>Bonificações da promo</span>
                  <table className="tbl" style={{marginBottom:8}}>
                    <thead><tr><th>Item</th><th style={{width:60}}>Qtd</th><th style={{width:28}}/></tr></thead>
                    <tbody>
                      {(promo.bonifs||[]).map((b,bi)=>(
                        <tr key={bi}>
                          <td><select className="inp-sm" value={b.item} onChange={e=>{const n=[...promos];const bns=[...(n[pi].bonifs||[])];bns[bi]={...bns[bi],item:e.target.value};n[pi]={...n[pi],bonifs:bns};setPromos(n)}}>
                            <option value="">Selecione...</option>
                            {bonifs.map(b=><option key={b.name} value={b.name}>{b.name}</option>)}
                          </select></td>
                          <td><input type="number" className="inp-sm" min="1" style={{textAlign:"center",width:48}} value={b.qty} onChange={e=>{const n=[...promos];const bns=[...(n[pi].bonifs||[])];bns[bi]={...bns[bi],qty:+e.target.value||1};n[pi]={...n[pi],bonifs:bns};setPromos(n)}}/></td>
                          <td><button className="btn-ghost" onClick={()=>{const n=[...promos];n[pi]={...n[pi],bonifs:(n[pi].bonifs||[]).filter((_,i)=>i!==bi)};setPromos(n)}}>×</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  <button className="btn btn-sec btn-sm" onClick={()=>{const n=[...promos];n[pi]={...n[pi],bonifs:[...(n[pi].bonifs||[]),{item:"",qty:1}]};setPromos(n)}}>+ Bonificação</button>
                </div>
              })}
              <button className="btn btn-gr btn-sm" style={{marginTop:8}} onClick={()=>setPromos([...promos,{name:"",totalPrice:0,comPct:null,items:[{product:"",qty:1}],bonifs:[]}])}>+ Nova promoção</button>
            </div>}

            {ctab==="kits"&&<div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div className="ctitle" style={{marginBottom:0}}><span className="dot"/>KITS DE PRODUTOS <span style={{fontSize:11,color:"var(--t3)",fontWeight:400,fontFamily:"'DM Sans',sans-serif"}}>· {kits.length} cadastrados</span></div>
              </div>
              <p style={{fontSize:12,color:"var(--t3)",marginBottom:12}}>Kits são conjuntos pré-definidos de produtos para agilizar pedidos. Não alteram preço — apenas adicionam itens ao pedido.</p>
              {kits.map((kit,ki)=>(
                <div key={ki} style={{background:"var(--s2)",border:"1px solid var(--bd)",borderRadius:10,padding:14,marginBottom:12}}>
                  <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
                    <div style={{flex:1}}>
                      <span className="lbl">Nome do kit</span>
                      <input value={kit.name} placeholder="Ex: Kit T100 completo" onChange={e=>{const n=[...kits];n[ki]={...n[ki],name:e.target.value};setKits(n)}}/>
                    </div>
                    <div style={{alignSelf:"flex-end"}}>
                      <button className="btn-ghost" style={{color:"var(--re)",fontSize:16}} onClick={()=>setKits(kits.filter((_,i)=>i!==ki))}>×</button>
                    </div>
                  </div>
                  <span className="lbl">Produtos do kit</span>
                  <table className="tbl" style={{marginBottom:8}}>
                    <thead><tr><th>Produto</th><th style={{width:60}}>Qtd</th><th style={{width:28}}/></tr></thead>
                    <tbody>
                      {(kit.items||[]).map((it,ii)=>(
                        <tr key={ii}>
                          <td><select className="inp-sm" value={it.product} onChange={e=>{const n=[...kits];const items=[...(n[ki].items||[])];items[ii]={...items[ii],product:e.target.value};n[ki]={...n[ki],items};setKits(n)}}>
                            <option value="">Selecione...</option>
                            {products.map(p=><option key={p.name} value={p.name}>{p.name}</option>)}
                          </select></td>
                          <td><input type="number" className="inp-sm" min="1" style={{textAlign:"center",width:48}} value={it.qty} onChange={e=>{const n=[...kits];const items=[...(n[ki].items||[])];items[ii]={...items[ii],qty:+e.target.value||1};n[ki]={...n[ki],items};setKits(n)}}/></td>
                          <td><button className="btn-ghost" onClick={()=>{const n=[...kits];n[ki]={...n[ki],items:(n[ki].items||[]).filter((_,i)=>i!==ii)};setKits(n)}}>×</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  <button className="btn btn-sec btn-sm" onClick={()=>{const n=[...kits];n[ki]={...n[ki],items:[...(n[ki].items||[]),{product:"",qty:1}]};setKits(n)}}>+ Produto</button>
                </div>
              ))}
              <button className="btn btn-gr btn-sm" style={{marginTop:8}} onClick={()=>setKits([...kits,{name:"",items:[{product:"",qty:1}]}])}>+ Novo kit</button>
            </div>}

            {ctab==="sellers"&&<div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div className="ctitle" style={{marginBottom:0}}><span className="dot ye"/>VENDEDORES <span style={{fontSize:11,color:"var(--t3)",fontWeight:400,fontFamily:"'DM Sans',sans-serif"}}>· {sellers.length} cadastrados</span></div>
                <button className="btn btn-sec btn-sm" onClick={()=>reset("s")}>Resetar padrão</button>
              </div>
              {sellers.map((s,idx)=>(
                <div key={idx} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                  <input style={{maxWidth:340}} value={s.name} placeholder="Nome do vendedor" onChange={e=>updSel(idx,e.target.value)}/>
                  <button className="btn-ghost" onClick={()=>setSellers(sellers.filter((_,i)=>i!==idx))}>×</button>
                </div>
              ))}
              <button className="btn btn-sec btn-sm" style={{marginTop:4}} onClick={()=>setSellers([...sellers,{name:""}])}>+ Novo vendedor</button>
            </div>}

            {ctab==="pin"&&<div className="card">
              <div className="ctitle"><span className="dot"/>ALTERAR PIN DE ACESSO</div>
              <p style={{fontSize:12,color:"var(--t2)",marginBottom:14}}>O PIN protege o acesso às configurações. Compartilhe apenas com administradores.</p>
              <div className="form-row" style={{maxWidth:300}}>
                <div>
                  <span className="lbl">Novo PIN</span>
                  <input type="password" maxLength={6} placeholder="Novo PIN" value={adminPin} onChange={e=>setAdminPin(e.target.value.replace(/\D/g,""))}/>
                </div>
              </div>
              <button className="btn btn-gr btn-sm" style={{marginTop:8}} onClick={()=>savePin(adminPin)}>Salvar PIN</button>
            </div>}

            <div className="card" style={{marginTop:12,background:"linear-gradient(135deg,rgba(59,130,246,.06),rgba(139,92,246,.06))",border:"1px solid rgba(59,130,246,.2)"}}>
              <div className="ctitle"><span className="dot bl"/>EXPORTAR CONFIGURAÇÃO</div>
              <p style={{fontSize:12,color:"var(--t2)",marginBottom:10}}>Copie o JSON abaixo e envie ao administrador para embutir no código.</p>
              <button className="btn btn-bl btn-sm" onClick={()=>{
                const cfg=JSON.stringify({promos,kits,sellers,products,bonifs,ncmData},null,2)
                try{const ta=document.createElement("textarea");ta.value=cfg;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);msg("✓ Config copiada!")}catch(e){msg("Erro ao copiar")}
              }}>📋 Copiar config (JSON)</button>
            </div>

            <div style={{fontSize:12,color:"var(--t3)",marginTop:8}}>
              🔒 Área restrita · Alterações salvas automaticamente · <button style={{background:"none",border:"none",color:"var(--re)",cursor:"pointer",fontSize:12,fontFamily:"inherit",textDecoration:"underline"}} onClick={()=>{setCfgAuth(false);setTab("pedido")}}>Sair da config</button>
            </div>
          </>}

        </div>
      </div>
    </>
  )
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
